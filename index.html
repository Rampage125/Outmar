<script>
  /* ----- CONFIG → DOM ------------------------------------------ */
  const cfg = window.OUTLINE_CONFIG || {};
  const RAW_KEY = cfg.ACCESS_KEY || "";

  // Имя: если задано — используем, иначе берём существующий хэш из ключа
  function extractName(key) {
    const i = key.lastIndexOf("#");
    if (i === -1) return "";
    try { return decodeURIComponent(key.slice(i + 1)); }
    catch (e) { return key.slice(i + 1); }
  }
  const NAME = (typeof cfg.NAME === "string" && cfg.NAME.trim())
    ? cfg.NAME.trim()
    : (extractName(RAW_KEY) || "unnamed");

  // Финальный ключ — с подставленным NAME в хэш
  function withName(key, name) {
    const hashIdx = key.indexOf("#");
    const base = hashIdx === -1 ? key : key.slice(0, hashIdx);
    return base + "#" + encodeURIComponent(name);
  }
  const ACCESS_KEY = withName(RAW_KEY, NAME);

  console.log("[OUTLINE] NAME =", NAME, "| final key =", ACCESS_KEY);

  // Применяем в DOM — везде один и тот же ключ
  document.getElementById("link").textContent = ACCESS_KEY;
  document.getElementById("key-name").textContent = NAME;
  document.getElementById("goBtn").setAttribute("href", ACCESS_KEY);

  // ID в заголовке (мелкая надпись справа от OUTLINE) —
  // показывает короткий префикс имени для антуража
  const idEl = document.getElementById("title-id");
  if (idEl) {
    const short = NAME.toUpperCase().replace(/[^A-Z0-9-]/g, "").slice(0, 8) || "SN-02";
    idEl.textContent = short;
  }

  /* ----- Copy & glitch ----------------------------------------- */
  const link = document.getElementById('link');
  const toast = document.getElementById('toast');
  const stage = document.getElementById('stage');
  const bar = document.getElementById('glitchBar');

  function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise((resolve, reject) => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '0';
      ta.style.width = '1px';
      ta.style.height = '1px';
      ta.style.opacity = '0';
      ta.setAttribute('readonly', '');
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      try {
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        ok ? resolve() : reject(new Error('execCommand failed'));
      } catch (e) {
        document.body.removeChild(ta);
        reject(e);
      }
    });
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1400);
  }

  document.getElementById('copyBtn').addEventListener('click', () => {
    copyText(link.innerText)
      .then(() => showToast('copied'))
      .catch(() => showToast('copy failed'));
  });

  document.querySelectorAll('.row').forEach(r => {
    r.addEventListener('mouseenter', () => {
      document.querySelectorAll('.row').forEach(x => {
        x.classList.remove('active');
        const trail = x.querySelector('.trail');
        const stripe = x.querySelector('.stripe-deco');
        if (trail) trail.remove();
        if (stripe) stripe.remove();
      });
      r.classList.add('active');
      if (!r.querySelector('.trail')) {
        const t = document.createElement('span');
        t.className = 'trail';
        r.appendChild(t);
      }
      if (!r.querySelector('.stripe-deco')) {
        const s = document.createElement('span');
        s.className = 'stripe-deco';
        r.appendChild(s);
      }
    });
  });

  function triggerBurst() {
    stage.classList.add('burst');
    setTimeout(() => stage.classList.remove('burst'), 450);
  }
  function triggerBar() {
    bar.classList.remove('active');
    void bar.offsetWidth;
    bar.classList.add('active');
  }
  function loop() {
    const delay = 1500 + Math.random() * 3000;
    setTimeout(() => {
      const r = Math.random();
      if (r > 0.3) triggerBurst();
      if (r > 0.5) triggerBar();
      if (r > 0.85) setTimeout(triggerBurst, 130);
      loop();
    }, delay);
  }
  loop();
</script>
</body>
</html>
